name: frank_karaoke
description: "YouTube karaoke wrapper with real-time singing scoring"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # WebView
  webview_flutter: ^4.12.0
  webview_flutter_android: ^4.4.0

  # YouTube audio extraction
  youtube_explode_dart: ^2.3.5

  # Audio
  just_audio: ^0.9.43
  record: ^6.0.0

  # Persistence
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30

  # Utilities
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
